name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `./run.sh`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Raspberry Pi OS (Bookworm)
        - Raspberry Pi OS (Bullseye)
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Debian 12
        - Other
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true
  - type: dropdown
    id: hardware
    attributes:
      label: Hardware
      options:
        - Raspberry Pi 4
        - Raspberry Pi 5
        - x86_64 server/desktop
        - Other
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output
      render: shell
    validations:
      required: false
